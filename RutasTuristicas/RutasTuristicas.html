<html ng-app="RutasTuristicasApp">

<head>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- APP -->
    <script src="js/app.js"></script>

    <!-- MODELOS -->
    <script src="js/modelos/pais.js"></script>
    <script src="js/modelos/ciudad.js"></script>
    <script src="js/modelos/tipo.js"></script>
    <script src="js/modelos/ruta.js"></script>
    <script src="js/modelos/parada.js"></script>

    <!-- SERVICIOS -->
    <script src="js/servicios/ciudad.servicio.js"></script>
    <script src="js/servicios/tipo.servicio.js"></script>
    <script src="js/servicios/ruta.servicio.js"></script>
    <script src="js/servicios/parada.servicio.js"></script>

    <!-- CONTROLADORES -->
    <script src="js/controladores/ruta.controlador.js"></script>
    <script src="js/controladores/app.controlador.js"></script>

</head>

<body ng-controller="RutasTuristicasControlador">

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark bg-dark stick-top">

        <span class="navbar-text text-white-50">

            <i class="bi bi-signpost-split"></i>

            Rutas Turísticas

        </span>

    </nav>

    <!-- CONTENEDOR PRINCIPAL -->

    <div class="container-fluid">

        <div class="row">

            <!-- MENÚ LATERAL -->

            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse p-0 vh-100">

                <ul class="nav flex-column gap-1 px-2">

                    <li class="nav-item">

                        <a class="nav-link rounded"
                           ng-click="cambiarVista('rutas')">

                            <i class="bi bi-signpost-split me-2"></i>

                            Rutas Turísticas

                        </a>

                    </li>

                </ul>

            </nav>

            <!-- CONTENIDO -->

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">

                <div ng-if="vistaActual === 'rutas'"
                     ng-controller="RutaControlador">

                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">

                        <h2>Gestión de Rutas Turísticas</h2>

                    </div>

                    <div class="row">

                        <!-- CIUDADES -->

                        <div class="col-lg-5 mb-4">

                            <div class="card shadow-sm">

                                <div class="card-header bg-dark text-white">

                                    Seleccione la Ciudad

                                </div>

                                <div class="list-group shadow-sm">

                                    <button
                                        type="button"
                                        class="list-group-item list-group-item-action"
                                        ng-repeat="ciudad in ciudades"
                                        ng-click="seleccionarCiudad(ciudad)">

                                        {{ciudad.nombre}}

                                    </button>

                                </div>

                            </div>

                        </div>

                        <!-- RUTAS -->

                        <div class="col-lg-7">

                            <div
                                ng-if="!ciudadSeleccionada"
                                class="alert alert-info text-center">

                                Seleccione una ciudad para visualizar las rutas.

                            </div>

                            <div
                                ng-if="ciudadSeleccionada"
                                class="card shadow-sm">

                                <div class="card-header bg-secondary text-white">

                                    Rutas en:

                                    <strong class="text-warning">

                                        {{ciudadSeleccionada.nombre}}

                                    </strong>

                                </div>

                                <div class="card-body">

                                    <div class="list-group shadow-sm">

                                        <button
                                            type="button"
                                            class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                                            ng-repeat="ruta in rutas"
                                            ng-click="seleccionarRuta(ruta)">

                                            <span>

                                                {{ruta.nombre}}

                                            </span>

                                        </button>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

</body>

</html>
